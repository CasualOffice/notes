name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --------------------------------------------------------------- Rust core
  # Core crates carry no GUI system dependencies and must stay verifiable
  # offline. `tauri-app` is built separately (needs webkit2gtk on Linux).
  rust:
    name: Rust core · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Only ubuntu is verified so far. macOS/Windows are informational: platform
    # adapters (keyring cred stores, etc.) are not yet validated there, so a
    # failure on those OSes must not block the merge.
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --exclude tauri-app --all-targets -- -D warnings

      - name: Build
        run: cargo check --workspace --exclude tauri-app

      - name: Test
        run: cargo test --workspace --exclude tauri-app

  # ----------------------------------------------------------------- Frontend
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  # ------------------------------------------------------ Tauri shell (Linux)
  # Compiles the full desktop shell with its system GUI dependencies. Kept
  # separate so a missing system library never masks the core-crate signal.
  tauri-shell:
    name: Tauri shell · ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev build-essential libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check tauri-app
        run: cargo check -p tauri-app

  # ---------------------------------------------------- Supply-chain / privacy
  audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin cargo-deny to the same version scripts/ci-local.sh uses, so a green
      # local run guarantees a green CI run. (The generic action bundles an older
      # cargo-deny that does not understand our deny.toml `unmaintained` field.)
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.20.2
      - run: cargo deny check advisories bans licenses sources

  # Guards the core promise: the shipped source must contain no telemetry.
  no-telemetry:
    name: Telemetry-absence scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for network/telemetry calls outside allowed crates
        run: |
          echo "Only crates/model-manager and crates/*updat* may open sockets."
          if grep -RInE "reqwest|hyper::client|TcpStream::connect|ureq::(get|post)|https?://" \
               crates --include='*.rs' \
               | grep -vE "crates/(model-manager|updater)/" \
               | grep -vE "^\s*//|doc =|///"; then
            echo "::error::Unexpected network usage found outside allowed crates."
            exit 1
          fi
          echo "OK — no telemetry/network calls outside allowed crates."
