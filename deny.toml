# cargo-deny configuration — supply-chain policy for the Casual Note workspace.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# Unmaintained advisories are evaluated only for our own workspace crates. Deep
# transitive GUI dependencies (gtk-rs GTK3 bindings, unic-* via Tauri/webkit2gtk)
# are flagged unmaintained upstream with no available fix and are out of our
# control, so they must not fail the build.
unmaintained = "workspace"

[bans]
multiple-versions = "warn"
# Deny wildcard version requirements on crates.io dependencies, but allow them
# for our internal path/workspace crates (which resolve to "*" by design).
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
version = 2
# Permissive licenses compatible with Apache-2.0 distribution.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
  "OpenSSL",
  "BSL-1.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
